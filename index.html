<html>
    <head>
        <title>Tri MyRide Service Area Map</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="map.css">
        <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
        <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css">
        <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
        <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css">
        <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
        <script src="map.js"></script>
    </head>
    <body>
      <div class="tri-my-ride-map">
        <h2>Address Lookup</h2>
        <p>Enter an address below to see if it is inside of the Tri MyRide service area.</p>
        <form id="address-form" class="address-form" novalidate>
          <label id="address-label">Street address</label>
          <div class="address-input-row">
            <div id="address-autocomplete" class="address-autocomplete"></div>
            <button type="submit" class="address-input-row-button">Check address</button>
          </div>
        </form>
        <div
          id="address-alert"
          class="address-alert"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
        <div id="tri-my-ride-service-map" class="tri-my-ride-map-container" aria-hidden="true"></div>
      </div>
    </body>
</html>
